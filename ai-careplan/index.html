<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIケアプラン自動生成システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>✨ AI Care Plan Generator</h1>
            <p>利用者情報を入力するだけで、最適な介護計画書を自動生成します</p>
        </header>

        <main class="main-content">
            <section class="input-section glass-panel">
                <h2>利用者情報入力</h2>
                <form id="carePlanForm">
                    <div class="form-group">
                        <label for="userName">利用者氏名</label>
                        <input type="text" id="userName" placeholder="例: 山田 太郎" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="age">年齢</label>
                            <input type="number" id="age" placeholder="例: 82" required>
                        </div>
                        <div class="form-group">
                            <label for="careLevel">要介護度</label>
                            <select id="careLevel" required>
                                <option value="" disabled selected>選択してください</option>
                                <option value="要支援1">要支援1</option>
                                <option value="要支援2">要支援2</option>
                                <option value="要介護1">要介護1</option>
                                <option value="要介護2">要介護2</option>
                                <option value="要介護3">要介護3</option>
                                <option value="要介護4">要介護4</option>
                                <option value="要介護5">要介護5</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="medicalHistory">疾患・既往歴</label>
                        <textarea id="medicalHistory" rows="2" placeholder="例: 高血圧、変形性膝関節症"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="userWish">ご本人の希望</label>
                        <textarea id="userWish" rows="2" placeholder="例: できるだけ自宅で生活を続けたい、自分で歩きたい"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="familyWish">ご家族の希望</label>
                        <textarea id="familyWish" rows="2" placeholder="例: 転倒が心配なので見守りをお願いしたい、日中一人になるのでデイサービスに行ってほしい"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="currentIssues">現在の課題（アセスメント）</label>
                        <textarea id="currentIssues" rows="3" placeholder="例: 膝の痛みにより室内移動に不安がある。入浴時に介助が必要。" required></textarea>
                    </div>

                    <button type="submit" class="generate-btn">
                        <span class="btn-text">AIケアプランを生成する</span>
                        <span class="loader" id="btnLoader"></span>
                    </button>
                </form>
            </section>

            <section class="output-section glass-panel" id="outputSection" style="display: none;">
                <h2>📝 生成されたケアプラン</h2>
                <div class="plan-content" id="planContent">
                    <!-- 生成されたコンテンツがここに挿入されます -->
                </div>
                <div class="action-buttons">
                    <button class="action-btn secondary" onclick="window.print()">印刷する</button>
                    <button class="action-btn primary" onclick="copyToClipboard()">コピーする</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
